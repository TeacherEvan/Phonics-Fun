<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Fun - Gameplay Smoke Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #101820;
            color: #f4f7fb;
        }

        h1 {
            margin-top: 0;
        }

        .actions {
            margin-bottom: 16px;
        }

        button {
            border: 0;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
            background: #2d7ff9;
            color: #fff;
        }

        .status {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            background: #1b2635;
        }

        .status.pass {
            background: #12381f;
            color: #7ff0a0;
        }

        .status.fail {
            background: #3a1619;
            color: #ff9aa2;
        }

        .checks {
            padding-left: 20px;
        }

        .checks li {
            margin-bottom: 8px;
        }

        iframe {
            width: 100%;
            height: 720px;
            border: 1px solid #33455d;
            border-radius: 8px;
            background: #fff;
        }
    </style>
</head>
<body>
    <h1>Gameplay Smoke Test</h1>
    <div class="actions">
        <button id="run-test">Run Smoke Test</button>
    </div>
    <div id="status" class="status">Status: Pending</div>
    <ol id="checks" class="checks"></ol>
    <iframe id="game-frame" title="Phonics Fun Game"></iframe>

    <script>
        const statusElement = document.getElementById('status');
        const checksElement = document.getElementById('checks');
        const frame = document.getElementById('game-frame');

        function setStatus(text, state) {
            statusElement.textContent = text;
            statusElement.className = state ? `status ${state}` : 'status';
        }

        function renderChecks(results) {
            checksElement.innerHTML = '';
            results.forEach(result => {
                const item = document.createElement('li');
                item.textContent = `${result.passed ? 'PASS' : 'FAIL'} - ${result.label}${result.details ? ` (${result.details})` : ''}`;
                checksElement.appendChild(item);
            });
        }

        function wait(ms) {
            return new Promise(resolve => window.setTimeout(resolve, ms));
        }

        function assert(results, label, condition, details = '') {
            results.push({ label, passed: Boolean(condition), details });
        }

        async function runSmokeTest() {
            const results = [];
            setStatus('Status: Running...', '');
            checksElement.innerHTML = '';

            localStorage.setItem('voiceTemplate', 'american-female');
            const cacheBust = Date.now();
            const indexHtml = await fetch(`../index.html?smoke-test=${cacheBust}`).then(response => response.text());
            const hydratedHtml = indexHtml
                .replace(/(href|src)="(css\/[^"]+|js\/[^"]+|Assets\/[^"]+)"/g, (match, attribute, url) => `${attribute}="../${url}"`)
                .replace(/(href|src)="([^"]+)"/g, (match, attribute, url) => {
                    if (/^(?:https?:|data:|#)/.test(url)) {
                        return match;
                    }

                    const separator = url.includes('?') ? '&' : '?';
                    return `${attribute}="${url}${separator}smoke-test=${cacheBust}"`;
                });

            frame.removeAttribute('src');
            frame.srcdoc = hydratedHtml;

            await new Promise((resolve, reject) => {
                const timeout = window.setTimeout(() => reject(new Error('Timed out waiting for index.html to load')), 12000);
                frame.onload = () => {
                    window.clearTimeout(timeout);
                    resolve();
                };
            });

            const win = frame.contentWindow;
            const doc = frame.contentDocument;

            assert(results, 'Game instance initializes with saved hyphenated voice template', Boolean(win && win.game));

            if (win && win.game) {
                const expectedLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
                const enabledLetters = Array.isArray(win.game.enabledLetters) ? win.game.enabledLetters.slice() : [];
                assert(
                    results,
                    'All 26 letters are enabled',
                    enabledLetters.length === expectedLetters.length && expectedLetters.every(letter => enabledLetters.includes(letter)),
                    `enabled=${enabledLetters.join(',')}`
                );

                const letterButtons = Array.from(doc.querySelectorAll('.letter-grid button'));
                const playableButtons = letterButtons.filter(button => button.classList.contains('playable'));
                assert(
                    results,
                    'Letter grid exposes all letters as playable',
                    playableButtons.length === 26,
                    `playable=${playableButtons.length}`
                );

                win.game.handleLetterSelection('C');
                await wait(5600);

                const targetPlanets = Array.from(doc.querySelectorAll('.planets-container .planet[data-letter="C"]'));
                assert(
                    results,
                    'Selecting C transitions into gameplay',
                    doc.querySelector('.screen.active')?.id === 'gameplay-screen'
                );
                assert(
                    results,
                    'Selecting C creates five target planets',
                    targetPlanets.length === 5,
                    `targets=${targetPlanets.length}`
                );
            }

            renderChecks(results);
            setStatus(
                results.every(result => result.passed) ? 'Status: PASS' : 'Status: FAIL',
                results.every(result => result.passed) ? 'pass' : 'fail'
            );
        }

        document.getElementById('run-test').addEventListener('click', () => {
            runSmokeTest().catch(error => {
                renderChecks([{ label: 'Smoke test execution', passed: false, details: error.message }]);
                setStatus(`Status: FAIL - ${error.message}`, 'fail');
            });
        });
    </script>
</body>
</html>
